version: 2

project_name: cmdspec

before:
  hooks:
    - go mod tidy

builds:
  - id: cmdspec
    main: .
    binary: cmdspec
    ldflags:
      - -s -w -X github.com/theaiteam-dev/commandspec/cmd.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: cmdspec
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: theaiteam-dev
    name: swagger-jack
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
